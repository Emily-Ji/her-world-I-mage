<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>她的世界</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Long+Cang&family=ZCOOL+XiaoWei&display=swap');
:root{
  --gold:#d0d0e8;--gold2:#9090b8;--jade:#9070d0;--blood:#8b1a1a;
  --paper:#f0e8d4;--purple:#6a3090;
  --tier-normal:#e8e8e8;--tier-rare:#a8d8ff;--tier-legend:#c896ff;--tier-myth:#ffd700;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#0a0010;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;height:100dvh;width:100dvw;overflow:hidden;}
#app{width:min(430px,100vw);height:min(860px,100dvh);position:relative;overflow:hidden;background:#0a0010;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ══ TOAST ══ */
#toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid var(--gold);padding:7px 18px;font-size:11px;color:#d0d0e8;letter-spacing:2px;white-space:nowrap;z-index:9999;pointer-events:none;border-radius:20px;opacity:0;transition:opacity .3s;}
#toast.on{opacity:1;}

/* ══ TITLE SCREEN ══ */
#s-title{background:#080014;align-items:center;justify-content:flex-end;padding-bottom:60px;}
.title-bg{position:absolute;inset:0;overflow:hidden;}
.title-stars{position:absolute;inset:0;}
.title-star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
.title-glitter{position:absolute;bottom:0;left:0;right:0;height:55%;background:radial-gradient(ellipse 100% 80% at 50% 100%,rgba(100,50,180,.5),transparent 70%);}
.title-wave{position:absolute;bottom:0;left:0;right:0;height:40%;overflow:hidden;}
.wave-svg{position:absolute;bottom:0;left:-10%;width:120%;animation:waveMove 4s ease-in-out infinite;}
@keyframes waveMove{0%,100%{transform:translateX(0) scaleY(1);}50%{transform:translateX(-3%) scaleY(1.05);}}
.title-sparkle{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff 0%,rgba(180,100,255,.8) 40%,transparent 70%);animation:sparkleF linear infinite;}
@keyframes sparkleF{0%{opacity:0;transform:scale(0);}30%{opacity:1;transform:scale(1);}60%{opacity:.5;transform:scale(.7);}100%{opacity:0;transform:scale(0);}}
.title-chandelier{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:200px;height:120px;pointer-events:none;}
.chandelier-svg{width:100%;animation:chandelierSway 6s ease-in-out infinite;}
@keyframes chandelierSway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}

/* Hero V layout on title */
.title-heroes{position:absolute;bottom:160px;left:0;right:0;height:500px;pointer-events:none;}
.title-hero{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;}
.title-hero img{object-fit:contain;filter:drop-shadow(0 0 20px rgba(150,80,255,.8));}
.th-center{left:50%;transform:translateX(-50%);z-index:3;bottom:20px;}
.th-center img{height:380px;}
.th-left{left:2%;z-index:2;bottom:0;}
.th-left img{height:310px;transform:scaleX(-1);}
.th-right{right:2%;z-index:2;bottom:0;}
.th-right img{height:310px;}

.title-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:12px;}
.title-logo{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:48px;color:#e0c8ff;letter-spacing:10px;text-shadow:0 0 30px rgba(180,100,255,.9),0 0 60px rgba(100,50,200,.5);animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{text-shadow:0 0 30px rgba(180,100,255,.9),0 0 60px rgba(100,50,200,.5);}50%{text-shadow:0 0 50px rgba(200,150,255,1),0 0 100px rgba(150,80,255,.8);}}
.title-sub{font-size:11px;color:rgba(200,180,255,.5);letter-spacing:5px;}
.title-div{width:180px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,150,255,.6),transparent);}
.tbtn{background:linear-gradient(135deg,rgba(100,40,160,.9),rgba(160,80,220,.9));color:#e0c8ff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;letter-spacing:3px;padding:12px 36px;cursor:pointer;border:1px solid rgba(200,150,255,.4);border-radius:8px;box-shadow:0 4px 20px rgba(120,40,200,.5);transition:all .2s;backdrop-filter:blur(4px);}
.tbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(150,60,255,.7);}
.tbtn-outline{background:rgba(255,255,255,.05);border:1px solid rgba(200,150,255,.25);color:rgba(200,180,255,.6);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;letter-spacing:2px;padding:8px 24px;cursor:pointer;border-radius:6px;transition:all .2s;}

/* ══ MAIN HUB ══ */
#s-hub{background:#050010;flex-direction:column;}
.hub-bg{position:absolute;inset:0;overflow:hidden;}
.hub-scene{position:absolute;inset:0;overflow:hidden;}
.hub-stars{position:absolute;inset:0;}
.hub-hero-display{position:absolute;bottom:95px;left:50%;transform:translateX(-50%);height:340px;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;z-index:1;}
.hub-hero-display img{height:320px;object-fit:contain;filter:drop-shadow(0 0 30px rgba(255,255,255,.6)) drop-shadow(0 0 60px rgba(200,180,255,.5));animation:hubFloat 4s ease-in-out infinite;}
@keyframes hubFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.hub-top{flex-shrink:0;padding:10px 14px 6px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(200,150,255,.1);position:relative;z-index:5;}
.hub-avatar{width:40px;height:40px;border-radius:50%;border:2px solid rgba(200,150,255,.4);overflow:hidden;background:rgba(100,40,180,.3);}
.hub-avatar img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
.hub-name{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:14px;color:#e0c8ff;letter-spacing:2px;}
.hub-base{font-size:10px;color:rgba(200,180,255,.4);}
.hub-resources{margin-left:auto;display:flex;gap:10px;align-items:center;}
.hub-res{display:flex;align-items:center;gap:3px;font-size:11px;color:#d0d0e8;}
.hub-mid{flex:1;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;}
.hub-btns{position:absolute;bottom:110px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:5;padding:0 20px;}
.hub-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:rgba(0,0,0,.5);border:1px solid rgba(200,150,255,.3);border-radius:12px;padding:12px 18px;cursor:pointer;transition:all .2s;min-width:80px;}
.hub-btn:hover{border-color:rgba(200,150,255,.7);background:rgba(100,40,180,.3);}
.hub-btn-icon{font-size:26px;}
.hub-btn-label{font-size:10px;color:rgba(200,180,255,.7);letter-spacing:1px;}
.hub-notif{position:absolute;top:-5px;right:-5px;width:14px;height:14px;background:#ff4040;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;}

/* Bottom Nav */
.bottom-nav{flex-shrink:0;height:72px;background:rgba(0,0,0,.8);border-top:1px solid rgba(200,150,255,.15);display:flex;align-items:center;justify-content:space-around;padding:0 8px;padding-bottom:max(env(safe-area-inset-bottom,0px),16px);position:relative;z-index:10;}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 16px;border-radius:8px;transition:all .2s;position:relative;}
.nav-tab.active{background:rgba(150,60,220,.25);}
.nav-tab-icon{font-size:20px;transition:transform .2s;}
.nav-tab.active .nav-tab-icon{transform:scale(1.15);}
.nav-tab-label{font-size:9px;color:rgba(200,180,255,.5);letter-spacing:1px;}
.nav-tab.active .nav-tab-label{color:#e0c8ff;}
.nav-new-badge{position:absolute;top:4px;right:8px;background:#ff4040;border-radius:8px;font-size:8px;color:#fff;padding:1px 5px;animation:badgePulse 1s ease-in-out infinite;}
@keyframes badgePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

/* ══ BATTLE SCREEN (main game) ══ */
#s-battle{background:#1e1035;flex-direction:column;overflow:hidden;}
.battle-scene{position:absolute;top:0;left:0;right:0;height:175px;overflow:hidden;}

/* enemy lane */
.enemy-lane{position:absolute;top:5px;left:0;right:0;height:165px;overflow:visible;z-index:10;}
.enemy-sprite{position:absolute;display:flex;flex-direction:column;align-items:center;transition:left .4s ease;z-index:11;}
.enemy-sprite svg{animation:enemyWalk .5s steps(2) infinite;}
@keyframes enemyWalk{0%{transform:translateY(0);}50%{transform:translateY(3px);}}
.enemy-hp-mini{width:36px;height:4px;background:rgba(0,0,0,.3);border-radius:2px;overflow:hidden;margin-top:2px;}
.enemy-hp-mini-f{height:100%;background:#ff4040;border-radius:2px;transition:width .3s;}
.dmg-num{position:absolute;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:18px;font-weight:bold;pointer-events:none;animation:dmgFloat .8s ease-out forwards;z-index:50;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-40px) scale(.7);}}
/* board area */
.board-area{position:absolute;top:175px;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:linear-gradient(180deg,#1e1035,#251540);}
.board-top-bar{flex-shrink:0;padding:2px 10px;background:rgba(30,10,60,.8);border-bottom:1px solid rgba(180,120,255,.2);display:flex;align-items:center;gap:6px;}
.btb-wave{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:12px;color:#d0d0e8;}
.btb-steps{display:flex;align-items:center;gap:3px;margin-left:auto;}
.btb-steps-n{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:18px;color:#ffd700;}
.btb-steps-n.low{color:#ff4040;animation:stepShake .3s ease;}
@keyframes stepShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.skills-strip{flex-shrink:0;padding:2px 8px;background:rgba(20,8,45,.6);display:flex;gap:4px;overflow-x:auto;min-height:24px;align-items:center;}
.skills-strip::-webkit-scrollbar{display:none;}
.sk-chip{font-size:8px;color:#d0d0e8;background:rgba(200,200,230,.15);border:1px solid rgba(200,200,230,.25);border-radius:10px;padding:1px 6px;white-space:nowrap;flex-shrink:0;}
.hero-stats-row{flex-shrink:0;padding:2px 8px;background:rgba(20,8,45,.7);display:flex;gap:5px;align-items:center;overflow-x:auto;}
.hero-stats-row::-webkit-scrollbar{display:none;}
.hsr-hero{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.hsr-av{width:24px;height:24px;border-radius:50%;overflow:hidden;border:1px solid rgba(200,150,255,.4);}
.hsr-av img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
.hsr-name{font-size:8px;color:#d0d0e8;}
.hsr-atk{font-size:8px;color:#b090e8;}
.hsr-ult{font-size:8px;color:#ff9090;margin-left:2px;}
.total-power{margin-left:auto;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:14px;color:#d0d0e8;flex-shrink:0;}

/* grid board */
.board-wrap{flex:1;padding:3px;display:flex;align-items:center;justify-content:center;}
#board{display:grid;gap:2px;width:100%;}
.cell{border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:border .1s,transform .1s;overflow:hidden;aspect-ratio:1;}
.cell:active{transform:scale(.9);}
.cell.sel{border:2px solid #fff !important;box-shadow:0 0 10px rgba(255,255,255,.8);transform:scale(1.08);z-index:3;}
.cell.mfl{animation:mergeFlash .35s ease-out;}
@keyframes mergePartAnim{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(calc(-50% + var(--px)),calc(-50% + var(--py))) scale(0.3);}
}
@keyframes mergeFlashText{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-60%) scale(1.4);}
  100%{opacity:0;transform:translate(-50%,-80%) scale(0.8);}
}
@keyframes mergeFlash{0%{filter:brightness(1);}40%{filter:brightness(3);}100%{filter:brightness(1);}}
/* tier colors */
.cell.tier-empty{background:#1a1030;border:1px solid rgba(100,80,160,.2);}
.cell.tier-normal{background:#f5f0ff;border:2px solid rgba(200,180,255,.5);}
.cell.tier-rare{background:#1a3a6a;border:1px solid rgba(100,160,255,.6);}
.cell.tier-legend{background:#3a1060;border:1px solid rgba(180,80,255,.7);}
.cell.tier-myth{background:#604000;border:1px solid rgba(255,200,0,.8);}
.cell.tier-coin{background:#3a3a1a;border:1px solid rgba(200,200,230,.3);}
.cell.tier-chest{background:#1a2a3a;border:1px solid rgba(100,200,255,.4);}
.cell-img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
.cell-tier-tag{position:absolute;bottom:1px;right:2px;font-size:6px;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;color:rgba(255,255,255,.8);text-shadow:0 0 3px rgba(0,0,0,.9);}
.cell-icon{font-size:22px;line-height:1;}
.cell-label{font-size:6px;color:rgba(255,255,255,.6);}
.cell-ult-ring{position:absolute;inset:0;border-radius:5px;border:2px solid #ffd700;box-shadow:0 0 8px #ffd700,inset 0 0 8px rgba(255,215,0,.3);animation:ultPulse 1s ease-in-out infinite;pointer-events:none;}
@keyframes ultPulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.long-press-menu{position:absolute;z-index:100;background:rgba(0,0,0,.9);border:1px solid rgba(200,150,255,.5);border-radius:8px;padding:6px;display:flex;flex-direction:column;gap:4px;}
.lp-btn{font-size:11px;color:#e0c8ff;padding:5px 12px;cursor:pointer;border-radius:4px;white-space:nowrap;}
.lp-btn:hover{background:rgba(150,60,220,.4);}
/* base hp bar */
.base-hp-bar{flex-shrink:0;padding:3px 10px;background:rgba(15,5,35,.85);display:flex;align-items:center;gap:6px;border-top:1px solid rgba(100,200,100,.2);}
.base-hp-icon{font-size:14px;}
.base-hp-bg{flex:1;height:10px;background:rgba(0,0,0,.5);border-radius:5px;overflow:hidden;border:1px solid rgba(160,100,255,.3);}
.base-hp-f{height:100%;background:linear-gradient(90deg,#4a1a8a,#9050d0);border-radius:5px;transition:width .5s;}
.base-hp-text{font-size:9px;color:#80ff80;min-width:70px;text-align:right;}
.btm-btns{flex-shrink:0;padding:4px 10px;background:rgba(20,8,45,.8);display:flex;gap:6px;}
.go-home-btn{background:rgba(255,255,255,.2);border:1px solid rgba(200,150,255,.3);color:rgba(200,180,255,.8);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;padding:7px 14px;cursor:pointer;border-radius:6px;}
.pause-btn{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);color:#ffd700;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;padding:7px 14px;cursor:pointer;border-radius:6px;margin-left:auto;}

/* ULT overlay */
.ult-overlay{position:absolute;inset:0;pointer-events:none;z-index:80;display:none;}
.ult-overlay.show{display:block;}
.ult-flash{position:absolute;inset:0;border-radius:0;animation:ultFlash .6s ease-out forwards;}
@keyframes ultFlash{0%{background:rgba(255,215,0,.5);}100%{background:rgba(255,215,0,0);}}
.ult-text{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:32px;color:#ffd700;text-shadow:0 0 20px #ffd700,0 0 40px rgba(255,165,0,.8);animation:ultTextAnim .8s ease-out forwards;white-space:nowrap;}
@keyframes ultTextAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}40%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}70%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-20px);}}
.ult-particle{position:absolute;border-radius:50%;animation:ultPart .7s ease-out forwards;}
@keyframes ultPart{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0) translate(var(--px),var(--py));}}

/* Merge animation overlay */
.merge-anim{position:absolute;z-index:60;pointer-events:none;animation:mergeAnim .5s ease-out forwards;}
@keyframes mergeAnim{0%{opacity:1;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}100%{opacity:0;transform:scale(.5);}}

/* ══ CHEST OVERLAY ══ */
#chest-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#chest-overlay.show{display:flex;}
.co-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:22px;color:#d0d0e8;letter-spacing:4px;}
.co-sub{font-size:10px;color:rgba(240,232,212,.4);}
.co-cards{display:flex;flex-direction:column;gap:8px;width:86%;max-width:340px;}
.co-card{background:linear-gradient(135deg,rgba(25,20,45,.95),rgba(15,12,35,.98));border:2px solid rgba(160,140,220,.35);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.co-card:hover{border-color:rgba(200,180,255,.8);transform:scale(1.02);}
.co-card-icon{font-size:30px;flex-shrink:0;}
.co-card-name{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:13px;color:#d0d0e8;}
.co-card-desc{font-size:10px;color:rgba(240,232,212,.65);margin-top:1px;}
.co-card-tag{font-size:8px;color:#b090e8;background:rgba(120,80,200,.15);border:1px solid rgba(150,100,220,.25);padding:1px 5px;border-radius:6px;margin-top:2px;display:inline-block;}

/* ══ VN SCREEN ══ */
#s-vn{background:#060404;}
.vn-bg{position:absolute;inset:0;}
.vn-bg-miao{background:radial-gradient(ellipse 60% 70% at 50% 100%,#1a3d28,transparent 65%),linear-gradient(180deg,#060408,#0a1010 50%,#060404);}
.vn-bg-ruins{background:radial-gradient(ellipse 70% 60% at 50% 100%,#1a0f0f,transparent 65%),linear-gradient(180deg,#060404,#120808 55%,#060404);}
.vn-bg-dark{background:radial-gradient(ellipse 70% 80% at 50% 100%,#0a0520,transparent 70%),linear-gradient(180deg,#020008,#060010 55%,#020008);}
.vn-orb{position:absolute;border-radius:50%;filter:blur(50px);animation:orbP 5s ease-in-out infinite;pointer-events:none;}
@keyframes orbP{0%,100%{opacity:.2;}50%{opacity:.45;}}
#vnchar{position:absolute;bottom:200px;left:50%;transform:translateX(-50%) translateY(20px);width:260px;height:420px;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity 1.2s,transform 1.2s;}
#vnchar.vis{opacity:1;transform:translateX(-50%) translateY(0);}
#vnchar img{height:400px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(120,80,200,.6));animation:vnFloat 4s ease-in-out infinite;}
@keyframes vnFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
#vnnp{position:absolute;top:18px;left:14px;opacity:0;transition:opacity .6s;}
#vnnp.vis{opacity:1;}
.np-box{border:1px solid var(--gold);padding:4px 12px;background:rgba(6,4,4,.9);clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);}
.np-name{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:18px;color:#d0d0e8;letter-spacing:4px;}
.np-sub{font-size:9px;color:#b090e8;letter-spacing:2px;}
#vnbox{position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(180deg,rgba(6,4,4,.88),rgba(4,3,2,.97));border-top:1px solid rgba(200,200,230,.2);padding:12px 18px 10px;}
#vnbox::before{content:'';position:absolute;top:0;left:18px;right:18px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
#vnsp{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:14px;color:#d0d0e8;letter-spacing:3px;margin-bottom:6px;min-height:18px;}
#vntxt{font-size:13px;color:var(--paper);line-height:1.85;letter-spacing:.8px;min-height:70px;white-space:pre-wrap;}
#vntxt.narr{font-style:italic;color:rgba(240,232,212,.5);font-size:12px;}
#vnhint{position:absolute;bottom:10px;right:18px;color:var(--gold2);font-size:10px;opacity:0;transition:opacity .4s;animation:hf 1.5s ease-in-out infinite;}
#vnhint.vis{opacity:1;}
@keyframes hf{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
#vnchoices{position:absolute;bottom:200px;left:0;right:0;padding:0 14px;flex-direction:column;gap:5px;display:none;}
#vnchoices.vis{display:flex;}
.vn-ch{background:rgba(6,4,4,.93);border:1px solid rgba(200,200,230,.3);color:var(--paper);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:12px;padding:9px 14px;text-align:left;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all .18s;}
.vn-ch:hover{border-color:#d0d0e8;color:#d0d0e8;}
.vn-ch-aff{font-size:9px;color:#b090e8;margin-left:6px;}
#vnjoin{position:absolute;inset:0;background:rgba(6,4,4,.92);flex-direction:column;align-items:center;justify-content:center;gap:10px;display:none;z-index:5;}
#vnjoin.vis{display:flex;}
.join-em{font-size:52px;animation:popAnim .5s ease-out;}
@keyframes popAnim{0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}}
.join-nm{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:22px;color:#d0d0e8;letter-spacing:4px;}
.join-sb{font-size:11px;color:#b090e8;letter-spacing:3px;}
.vn-div{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:3px 0;}
.vn-gbtn{background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;letter-spacing:2px;padding:11px 32px;cursor:pointer;border:none;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.4);}

/* ══ GARRISON (驻地) ══ */
#s-garrison{background:linear-gradient(180deg,#0a0020,#0d0030);flex-direction:column;}
.garrison-hdr{flex-shrink:0;padding:10px 14px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(200,150,255,.12);display:flex;align-items:center;}
.garrison-hdr-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:16px;color:#e0c8ff;letter-spacing:3px;}
.garrison-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.garrison-body::-webkit-scrollbar{display:none;}

/* ══ AFFECTION SCREEN ══ */
#s-aff{background:#060404;flex-direction:column;}
.aff-orb{position:absolute;border-radius:50%;filter:blur(50px);animation:orbP 5s ease-in-out infinite;pointer-events:none;}
#aff-char-wrap{position:absolute;bottom:280px;left:50%;transform:translateX(-50%) translateY(20px);width:220px;height:380px;opacity:0;transition:opacity 1s,transform 1s;}
#aff-char-wrap.vis{opacity:1;transform:translateX(-50%) translateY(0);}
#aff-char-wrap img{height:360px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(139,79,160,.55));animation:vnFloat 4s ease-in-out infinite;}
#aff-top-bar{position:absolute;top:0;left:0;right:0;padding:10px 14px;background:linear-gradient(180deg,rgba(6,4,4,.95),transparent);z-index:5;display:flex;align-items:center;gap:8px;}
.aff-back-btn{background:transparent;border:1px solid rgba(200,200,230,.3);color:var(--gold2);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 10px;cursor:pointer;border-radius:4px;}
.aff-char-name{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:15px;color:#d0d0e8;letter-spacing:3px;}
.aff-bar-r{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.aff-bar-bg{width:90px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.aff-bar-fg{height:100%;background:linear-gradient(90deg,#a0a0c0,#e0e0f5);transition:width .7s;}
.aff-bar-lbl{font-size:9px;color:rgba(240,232,212,.3);}
.aff-bar-num{font-size:10px;color:#d0d0e8;}
#aff-panel{position:absolute;bottom:0;left:0;right:0;padding:10px 14px 12px;background:linear-gradient(180deg,rgba(6,4,4,.88),rgba(4,3,2,.97));border-top:1px solid rgba(200,200,230,.18);z-index:5;}
#aff-panel::before{content:'';position:absolute;top:0;left:14px;right:14px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.aff-mood-text{font-size:12px;color:rgba(240,232,212,.5);font-style:italic;min-height:50px;line-height:1.8;margin-bottom:10px;white-space:pre-wrap;}
.aff-acts-row{display:flex;gap:6px;}
.aff-act-btn{flex:1;background:rgba(6,4,4,.9);border:1px solid rgba(200,200,230,.28);color:var(--paper);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;padding:9px 5px;cursor:pointer;border-radius:6px;text-align:center;line-height:1.4;transition:all .18s;}
.aff-act-btn:hover{border-color:#d0d0e8;color:#d0d0e8;}
.aff-act-btn:disabled{border-color:rgba(200,200,230,.08);color:rgba(240,232,212,.2);cursor:not-allowed;}
.aff-act-small{display:block;font-size:8px;color:#b090e8;margin-top:2px;}
.aff-act-btn:disabled .aff-act-small{color:rgba(240,232,212,.18);}
#aff-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(6,4,4,.96);border:1px solid var(--gold);padding:18px 20px;text-align:center;z-index:20;opacity:0;pointer-events:none;transition:all .28s;border-radius:8px;min-width:260px;}
#aff-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:all;}
.pop-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:16px;color:#d0d0e8;letter-spacing:3px;margin-bottom:8px;}
.pop-body{font-size:12px;color:var(--paper);line-height:1.8;margin-bottom:8px;white-space:pre-wrap;text-align:left;}
.pop-aff{font-size:12px;color:#b090e8;margin-bottom:12px;}
.pop-close-btn{background:transparent;border:1px solid rgba(200,200,230,.35);color:var(--gold2);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;padding:6px 20px;cursor:pointer;border-radius:4px;}
.aff-gain-float{position:absolute;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:22px;color:#d0d0e8;pointer-events:none;z-index:30;text-shadow:0 0 10px rgba(200,200,230,.9);animation:fadeUpOut 1.3s ease-out forwards;top:40%;left:50%;transform:translateX(-50%);}
@keyframes fadeUpOut{0%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-50px);}}

/* ══ BACKPACK ══ */
#s-bag{background:linear-gradient(180deg,#080014,#0a0020);flex-direction:column;}
.bag-hdr{flex-shrink:0;padding:10px 14px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(200,150,255,.12);display:flex;align-items:center;gap:10px;}
.bag-hdr-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:16px;color:#e0c8ff;letter-spacing:3px;}
.bag-body{flex:1;overflow-y:auto;padding:12px;}
.bag-body::-webkit-scrollbar{display:none;}
.bag-section-lbl{font-size:10px;color:rgba(200,180,255,.35);letter-spacing:3px;margin-bottom:8px;}
.bag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.bag-item{background:rgba(0,0,0,.4);border:1px solid rgba(200,150,255,.2);border-radius:8px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s;position:relative;}
.bag-item:hover{border-color:rgba(200,150,255,.6);}
.bag-item-icon{font-size:28px;}
.bag-item-name{font-size:8px;color:rgba(200,180,255,.7);text-align:center;line-height:1.3;}
.bag-item-count{position:absolute;top:3px;right:5px;font-size:9px;color:#ffd700;}
.bag-empty{font-size:12px;color:rgba(200,180,255,.3);text-align:center;padding:30px 0;}

/* ══ PROFILE ══ */
#s-profile{background:linear-gradient(180deg,#080014,#0a0020);flex-direction:column;}
.profile-hdr{flex-shrink:0;padding:10px 14px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(200,150,255,.12);display:flex;align-items:center;gap:10px;}
.profile-hdr-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:16px;color:#e0c8ff;letter-spacing:3px;}
.profile-body{flex:1;overflow-y:auto;padding:14px;}
.profile-body::-webkit-scrollbar{display:none;}
.profile-section{background:rgba(0,0,0,.35);border:1px solid rgba(200,150,255,.15);border-radius:10px;padding:14px;margin-bottom:12px;}
.profile-section-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:13px;color:#e0c8ff;letter-spacing:2px;margin-bottom:10px;}
.profile-field{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.profile-field label{font-size:11px;color:rgba(200,180,255,.5);min-width:60px;}
.profile-input{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(200,150,255,.25);color:#e0c8ff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:12px;padding:7px 10px;border-radius:6px;outline:none;}
.profile-input:focus{border-color:rgba(200,150,255,.6);}
.profile-save-btn{width:100%;background:linear-gradient(135deg,rgba(100,40,160,.9),rgba(160,80,220,.9));color:#e0c8ff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;letter-spacing:2px;padding:10px;cursor:pointer;border:1px solid rgba(200,150,255,.3);border-radius:8px;margin-top:4px;}
.char-select-grid{display:flex;gap:8px;flex-wrap:wrap;}
.char-sel-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;transition:all .2s;}
.char-sel-item.selected{border-color:#d0d0e8;background:rgba(200,200,230,.1);}
.char-sel-av{width:50px;height:50px;border-radius:50%;overflow:hidden;border:1px solid rgba(200,150,255,.3);}
.char-sel-av img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
.char-sel-name{font-size:9px;color:#d0d0e8;}

/* ══ RESULT ══ */
#s-result{align-items:center;justify-content:center;gap:16px;background:#080014;}
.result-bg-win{background:radial-gradient(ellipse at 50% 40%,#1a3a0a,#0a1a04)!important;}
.result-bg-lose{background:radial-gradient(ellipse at 50% 40%,#3a0a0a,#1a0404)!important;}
.result-title-text{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','STSong','Long Cang',serif;font-size:40px;letter-spacing:8px;position:relative;z-index:1;}
.result-title-text.win{color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.8);}
.result-title-text.lose{color:#cc3030;text-shadow:0 0 40px rgba(200,30,30,.7);}
.result-div{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative;z-index:1;}
.result-stats-box{font-size:12px;color:var(--paper);letter-spacing:2px;text-align:center;line-height:2.4;position:relative;z-index:1;}
.result-stats-box b{color:#d0d0e8;}
.result-btns-row{display:flex;flex-direction:column;gap:10px;align-items:center;position:relative;z-index:1;}
.res-btn{background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;letter-spacing:2px;padding:11px 32px;cursor:pointer;border:none;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.4);}
.res-btn-out{background:rgba(255,255,255,.15);border:2px solid rgba(200,150,255,.4);color:rgba(200,180,255,.8);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:12px;padding:8px 22px;cursor:pointer;border-radius:6px;}

/* ══ COMMON UTILS ══ */
@keyframes sporeF{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.4);opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.gbtn{background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;letter-spacing:2px;padding:11px 32px;cursor:pointer;border:none;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.4);transition:all .2s;}
.gbtn-outline{background:rgba(255,255,255,.2);border:2px solid rgba(200,150,255,.4);color:rgba(200,180,255,.8);font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:12px;letter-spacing:2px;padding:8px 22px;cursor:pointer;border-radius:6px;transition:all .2s;}

@keyframes fxPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5);}60%{opacity:1;transform:translate(-50%,-160%) scale(1.3);}100%{opacity:0;transform:translate(-50%,-220%) scale(0.8);}}
@keyframes fxRing{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5);}100%{opacity:0;transform:translate(-50%,-50%) scale(2.5);}}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>

<!-- TITLE -->

  <div style="position:absolute;inset:0;overflow:hidden;">
    <img id="title-bg-img" src="" style="width:100%;height:100%;object-fit:cover;object-position:center top;"/>
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,0,12,.5) 0%,rgba(4,0,12,.1) 30%,rgba(4,0,12,.0) 55%,rgba(4,0,12,.6) 85%,rgba(4,0,12,.85) 100%);"></div>

</div>

<!-- BATTLE SCREEN -->
<div class="screen" id="s-battle">

  <div class="battle-scene" id="battle-scene" style="background:linear-gradient(180deg,#04020a 0%,#080415 30%,#0c0520 60%,#060310 100%);">

// ── GRID INIT ──
function initGrid() {
  const heroIds = state.selectedHeroes.length > 0 ? state.selectedHeroes : [Object.keys(CHARS)[0]];
  
  // Build array: max 5 coins, rest normal-tier heroes, distributed evenly
  const cells = [];
  let coinCount = 0;
  for(let i = 0; i < G*G; i++) {
    if(coinCount < 5 && Math.random() < 0.14) {
      cells.push({ type:'coin' });
      coinCount++;
    } else {
      const cid = heroIds[i % heroIds.length];
      cells.push({ type:'hero', charId:cid, tierIdx:0 });
    }
  }

  // Shuffle until no 3-connected group exists (max 30 tries)
  for(let attempt = 0; attempt < 30; attempt++) {
    shuffle(cells);
    grid = [...cells];
    if(!hasAnyGroup()) break;
  }

  // Safety: fill any nulls
  for(let i = 0; i < G*G; i++) {
    if(!grid[i]) grid[i] = { type:'hero', charId:heroIds[i % heroIds.length], tierIdx:0 };
  }
  // Reset tier properly
  for(let i = 0; i < G*G; i++) {
    if(grid[i] && grid[i].type === 'hero') {
      grid[i].tierIdx = 0; // ALWAYS start at 0 = normal/white
    }
  }
}

function hasAnyGroup() {
  for(let s = 0; s < G*G; s++) {
    if(!grid[s]) continue;
    if(bfsGroup(s, itemKey(grid[s])).length >= 3) return true;
  }
  return false;
}

// ── ITEM KEY (for grouping) ──
function itemKey(item) {
  if(!item) return null;
  if(item.type === 'hero') return 'hero_' + item.charId + '_' + item.tierIdx;
  if(item.type === 'coin') return 'coin';
  // Chests never group - use type as unique enough (each chest type is separate)
  // But they should never form groups since there's at most 1 of each type at a time
  return item.type; // chest_white, chest_blue, chest_purple - won't form groups of 3
}

// ── RENDER GRID ──
function renderGrid() {
  const bd = document.getElementById('board');
  bd.innerHTML = '';
  // Calculate cell size based on available width
  const appW = document.getElementById('app').offsetWidth || 390;
  const cellSize = Math.floor((appW - 10) / G) - 2;
  bd.style.cssText = `display:grid;grid-template-columns:repeat(${G},1fr);gap:2px;width:100%;`;

  for(let i = 0; i < G*G; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell ' + cellTierClass(grid[i]);
    const item = grid[i];

    if(item) {
      if(item.type === 'hero') {
        const img = document.createElement('img');
        img.className = 'cell-img';
        img.src = IMGS[item.charId] || '';
        cell.appendChild(img);
      } else {
        const icons = { coin:'🪙', chest_white:'📦', chest_blue:'💎', chest_purple:'💜' };
        const labels = { coin:'金币', chest_white:'白宝箱', chest_blue:'蓝宝箱', chest_purple:'紫宝箱' };
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:1px;';
        wrap.innerHTML = `<span style="font-size:20px;line-height:1;">${icons[item.type]||'?'}</span><span style="font-size:6px;color:rgba(255,255,255,.6);">${labels[item.type]||''}</span>`;
        cell.appendChild(wrap);
      }
    }

    if(i === selCell) cell.classList.add('sel');

    // Click: select / swap
    cell.addEventListener('click', () => onCellTap(i));

    // Long press: delete
    cell.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      longPressTimer = setTimeout(() => { longPressTimer = null; onLongPress(i); }, 600);
    });
    cell.addEventListener('pointerup', () => { if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; } });
    cell.addEventListener('pointercancel', () => { if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; } });

    // Add ult ring if ready
    if(item && item.type === 'hero' && state.ultCooldowns[item.charId] <= 0) {
      const ring = document.createElement('div');
      ring.className = 'cell-ult-ring';
      cell.appendChild(ring);
    }

    cell.style.height = (Math.floor((document.getElementById('app').offsetWidth||390)/G)-4)+'px';
    bd.appendChild(cell);
  }
}

function cellTierClass(item) {
  if(!item) return 'tier-empty';
  if(item.type === 'coin') return 'tier-coin';
  if(item.type === 'chest_white' || item.type === 'chest_blue' || item.type === 'chest_purple') return 'tier-chest';
  if(item.type === 'hero') {
    const t = item.tierIdx || 0;
    return ['tier-normal','tier-rare','tier-legend','tier-myth'][Math.min(t, 3)];
  }
  return '';
}

// ── CELL INTERACTIONS ──
function onCellTap(idx) {
  if(state.battleActive) return;
  const item = grid[idx];

  // Tap chest → open immediately (no step cost)
  if(item && (item.type === 'chest_white' || item.type === 'chest_blue' || item.type === 'chest_purple')) {
    grid[idx] = null;
    fillOneCell(idx);
    renderGrid();
    queueChest(item.type);
    return;
  }

  // No selection yet → select
  if(selCell === null) {
    if(!item) return;
    selCell = idx;
    renderGrid();
    return;
  }

  // Tap same cell → deselect
  if(selCell === idx) {
    selCell = null;
    renderGrid();
    return;
  }

  // Swap cells and consume step
  if(state.steps <= 0) {
    if(state.battlePhase === 'prepare') {
      if(confirm('步数已用尽！是否直接开始战斗？\n（确认：开始出战 / 取消：查看棋盘）')) {
        startFighting();
      }
    } else {
      showToast('步数已用尽！');
    }
    selCell = null;
    renderGrid();
    return;
  }

  swapCells(selCell, idx);
  selCell = null;
}

function onLongPress(idx) {
  if(state.steps <= 0) { showToast('步数不足！'); return; }
  const item = grid[idx];
  if(!item) return;

  // Check if this hero can use ult
  if(item.type === 'hero' && state.ultCooldowns[item.charId] <= 0 && state.battlePhase === 'fighting') {
    // Show choice: delete or ult
    showLongPressMenu(idx);
  } else {
    // Just delete
    deleteCell(idx);
  }
}

function showLongPressMenu(idx) {
  lpCellIdx = idx;
  const menu = document.getElementById('lp-menu');
  const bd = document.getElementById('board');
  const cell = bd.children[idx];
  if(!cell || !menu) return;
  const cr = cell.getBoundingClientRect();
  const ar = document.getElementById('app').getBoundingClientRect();
  const top = Math.max(10, cr.top - ar.top - 90);
  const left = Math.min(cr.left - ar.left, ar.width - 170);
  menu.style.cssText = `display:flex;top:${top}px;left:${left}px;`;
  const item = grid[idx];
  const ultBtn = document.getElementById('lp-ult');
  if(item && item.type === 'hero') {
    ultBtn.style.display = 'block';
    ultBtn.textContent = `⚡ ${CHARS[item.charId].ultName}`;
    ultBtn.onclick = () => { hideLPMenu(); triggerUlt(item.charId, idx); };
  } else {
    ultBtn.style.display = 'none';
  }
  document.getElementById('lp-delete').onclick = () => { hideLPMenu(); deleteCell(idx); };
}

function hideLPMenu() {
  const m = document.getElementById('lp-menu');
  if(m) m.style.display = 'none';
  lpCellIdx = -1;
}

function deleteCell(idx) {
  if(state.steps <= 0) { showToast('步数不足！'); return; }
  state.steps--;
  updateStepsDisplay();
  grid[idx] = null;
  fillOneCell(idx);
  renderGrid();
  renderHeroStats();
  showToast('🗑 删除 (-1步)');
}

function fillOneCell(idx) {
  const heroIds = state.selectedHeroes.length > 0 ? state.selectedHeroes : [Object.keys(CHARS)[0]];
  const coins = grid.filter(c => c && c.type === 'coin').length;
  if(coins < 5 && Math.random() < 0.18) {
    grid[idx] = { type:'coin' };
  } else {
    const cid = heroIds[Math.floor(Math.random() * heroIds.length)];
    grid[idx] = { type:'hero', charId:cid, tierIdx:0 };
  }
}

// ── SWAP + AUTO MERGE ──
function swapCells(from, to) {
  state.steps--;
  updateStepsDisplay();

  // Swap
  const tmp = grid[from];
  grid[from] = grid[to];
  grid[to] = tmp;

  renderGrid();

  // Check for merges after swap
  setTimeout(() => {
    checkAndMerge();
  }, 80);
}

let _merging = false;
function checkAndMerge(passCount) {
  if(_merging) return;
  if(passCount === undefined) passCount = 0;
  if(passCount >= 8) { _merging=false; renderGrid(); renderHeroStats(); return; }

  let merged = false;
  for(let s = 0; s < G*G; s++) {
    if(!grid[s]) continue;
    const item = grid[s];
    // Skip max-tier heroes - cannot merge further, avoids infinite loop
    if(item.type === 'hero') {
      const def = CHARS[item.charId];
      if(def && (item.tierIdx||0) >= def.tiers.length - 1) continue;
    }
    const key = itemKey(item);
    const group = bfsGroup(s, key);
    if(group.length >= 3) {
      merged = true;
      _merging = true;
      playMergeSound(item);
      const snap = { type:item.type, charId:item.charId, tierIdx:item.tierIdx||0 };
      triggerMergeAnimation(group, snap, () => {
        doMerge(group, snap);
        fillEmptyCells();
        renderGrid();
        renderHeroStats();
        _merging = false;
        setTimeout(() => checkAndMerge(passCount + 1), 180);
      });
      return;
    }
  }
  if(!merged) { _merging=false; renderGrid(); renderHeroStats(); }
}

// ── MERGE ANIMATION ──
function triggerMergeAnimation(group, item, callback) {
  const bd = document.getElementById('board');
  const appRect = document.getElementById('app').getBoundingClientRect();
  const elem = ELEM_PARTICLES[item.charId] || { color:'#fff', symbol:'✦', label:'' };

  // Flash all cells in group
  group.forEach(idx => {
    const cell = bd.children[idx];
    if(!cell) return;
    cell.classList.add('mfl');
    // Spawn element particles from each cell
    const cr = cell.getBoundingClientRect();
    const cx = cr.left + cr.width/2 - appRect.left;
    const cy = cr.top + cr.height/2 - appRect.top;
    for(let p = 0; p < 8; p++) {
      const el = document.createElement('div');
      const angle = (p / 8) * Math.PI * 2;
      const dist = 25 + Math.random() * 20;
      const sz = 10 + Math.random() * 8;
      el.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;font-size:${sz}px;pointer-events:none;z-index:200;animation:mergePartAnim .5s ease-out forwards;--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;transform:translate(-50%,-50%);`;
      el.textContent = elem.symbol;
      document.getElementById('app').appendChild(el);
      setTimeout(() => el.remove(), 520);
    }
    // Center flash text
    const ft = document.createElement('div');
    ft.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;transform:translate(-50%,-50%);font-size:18px;font-weight:bold;color:${elem.color};pointer-events:none;z-index:201;text-shadow:0 0 12px ${elem.color};animation:mergeFlashText .45s ease-out forwards;`;
    ft.textContent = '✦';
    document.getElementById('app').appendChild(ft);
    setTimeout(() => ft.remove(), 460);
  });

  setTimeout(() => {
    group.forEach(idx => { const c = bd.children[idx]; if(c) c.classList.remove('mfl'); });
    callback();
  }, 420);
}

// ── MERGE LOGIC ──
function doMerge(group, item) {
  const n = group.length;
  group.forEach(i => grid[i] = null);

  if(item.type === 'coin') {
    // 3→white(open now), 4→blue, 5→purple, 6→2×purple
    if(n >= 6) {
      setTimeout(() => { queueChest('chest_purple'); queueChest('chest_purple'); }, 100);
    } else if(n >= 5) {
      setTimeout(() => queueChest('chest_purple'), 100);
    } else if(n >= 4) {
      setTimeout(() => queueChest('chest_blue'), 100);
    } else {
      setTimeout(() => queueChest('chest_white'), 100);
    }
    return;
  }

  if(item.type === 'hero') {
    const def = CHARS[item.charId];
    if(!def) return;
    const maxTierIdx = def.tiers.length - 1;
    const curTierIdx = item.tierIdx || 0;

    if(curTierIdx >= maxTierIdx) {
      // Already max tier - put them all back as-is, no merge
      group.forEach(i => grid[i] = { type:'hero', charId:item.charId, tierIdx:curTierIdx });
      return; // checkAndMerge skips max-tier heroes so this shouldn't be called
    }

    // Upgrade count based on group size
    // 3 → 1 upgrade, 4 → 2 upgrades, 5 → 3 upgrades, 6 → 2 upgrades (skip a tier)
    let upgrades = 0;
    let targetTierIdx = curTierIdx + 1;

    if(n >= 6) {
      upgrades = 2;
      targetTierIdx = Math.min(maxTierIdx, curTierIdx + 2); // skip tier
    } else if(n >= 5) {
      upgrades = 3;
    } else if(n >= 4) {
      upgrades = 2;
    } else {
      upgrades = 1;
    }

    // Place upgraded heroes
    let placed = 0;
    for(let u = 0; u < upgrades && placed < group.length; u++) {
      grid[group[placed++]] = { type:'hero', charId:item.charId, tierIdx:Math.min(targetTierIdx, maxTierIdx) };
    }
    // Remaining become null (will be filled)
    for(let i = placed; i < group.length; i++) grid[group[i]] = null;

    const tierName = def.tiers[Math.min(targetTierIdx, maxTierIdx)]?.l || '';
    showToast(`✦ ${def.name} ×${upgrades} 升至${tierName}！`);
  }
}

// ── BFS GROUP ──
function bfsGroup(startIdx, key) {
  if(!key) return [];
  const group = [], visited = new Set(), queue = [startIdx];
  visited.add(startIdx);
  while(queue.length) {
    const idx = queue.shift();
    if(!grid[idx] || itemKey(grid[idx]) !== key) continue;
    group.push(idx);
    const r = Math.floor(idx/G), c = idx%G;
    [[r>0,idx-G],[r<G-1,idx+G],[c>0,idx-1],[c<G-1,idx+1]].forEach(([ok,n]) => {
      if(ok && !visited.has(n)) { visited.add(n); queue.push(n); }
    });
  }
  return group;
}

// ── FILL EMPTY CELLS ──
function fillEmptyCells() {
  const heroIds = state.selectedHeroes.length > 0 ? state.selectedHeroes : [Object.keys(CHARS)[0]];
  let coins = grid.filter(c => c && c.type === 'coin').length;
  for(let i = 0; i < G*G; i++) {
    if(!grid[i]) {
      if(coins < 5 && Math.random() < 0.18) {
        grid[i] = { type:'coin' };
        coins++;
      } else {
        const cid = heroIds[Math.floor(Math.random() * heroIds.length)];
        grid[i] = { type:'hero', charId:cid, tierIdx:0 };
      }
    }
  }
}

// ── HERO STATS ──
function renderHeroStats() {
  const row = document.getElementById('hero-stats-row');

  row.innerHTML = '';
  state.selectedHeroes.forEach(cid => {

function renderSkillsStrip() {

  if(!bar) return;
  bar.innerHTML = '';
  if(state.skills.length === 0) {
    bar.appendChild(mkEl('span','','开宝箱获得技能 →',{style:'font-size:8px;color:rgba(200,180,255,.3);'}));
    return;
  }
  state.skills.forEach(sid => {
    const sk = SKILLS_POOL.find(s => s.id===sid);
    if(sk) bar.appendChild(mkEl('div','sk-chip', sk.icon+' '+sk.name));
  });
}

function updateStepsDisplay() {
  const el = document.getElementById('btb-steps');
  if(!el) return;
  el.textContent = state.steps;
  el.className = 'btb-steps-n' + (state.steps <= 3 ? ' low' : '');
}

function calcHeroAtk(cid) {
  let bestTier = 0;
  grid.forEach(c => { if(c && c.type==='hero' && c.charId===cid) bestTier = Math.max(bestTier, c.tierIdx||0); });
  const def = CHARS[cid];
  let atk = def.tiers[Math.min(bestTier, def.tiers.length-1)].a;
  state.skills.forEach(sid => {
    const sk = SKILLS_POOL.find(s => s.id===sid); if(!sk) return;
    if(sk.atkMult) atk = Math.floor(atk*sk.atkMult);
    if(sk.charBonus&&sk.charBonus[cid]) atk = Math.floor(atk*sk.charBonus[cid]);
    if(sk.affBonus&&state.aff[cid]>=MAX_AFF) atk = Math.floor(atk*sk.affBonus);
  });
  if(state.aff[cid]>=MAX_AFF) atk = Math.floor(atk*1.1);
  atk = Math.floor(atk*state.atkBonus*state.spdBonus);
  return atk;
}
function calcTotalAtk() { return state.selectedHeroes.reduce((s,cid)=>s+calcHeroAtk(cid),0); }

function flashCell(idx) {
  const bd = document.getElementById('board');
  if(bd && bd.children[idx]) {
    bd.children[idx].classList.add('mfl');
    setTimeout(()=>{ if(bd.children[idx]) bd.children[idx].classList.remove('mfl'); },350);
  }
}


// ══════════════════════════════════════
//  ENEMY / WAVE SYSTEM
// ══════════════════════════════════════
function spawnWave(waveIdx){
  state.wave=waveIdx;
  const waveData=MONSTERS_BY_WAVE[Math.min(waveIdx,MONSTERS_BY_WAVE.length-1)];
  state.enemiesThisWave=[...waveData];
  state.enemiesSpawned=0;state.waveCleared=false;
  document.getElementById('btb-wave').textContent=`第 ${waveIdx+1} 波`;
  // spawn interval
  state.enemySpawnTimer=0;
  // Give extra steps each new wave (after first)
  if(waveIdx>0){state.steps+=5;updateStepsDisplay();showToast(`🌊 第${waveIdx+1}波来袭！+5步数`);}
  startGameLoop();
}

function startGameLoop(){
  if(gameLoopId)cancelAnimationFrame(gameLoopId);
  lastTime=performance.now();
  function loop(now){
    if(!state.battleActive){return;}
    const dt=Math.min(now-lastTime,100);lastTime=now;
    if(!state.paused)update(dt);
    gameLoopId=requestAnimationFrame(loop);
  }
  gameLoopId=requestAnimationFrame(loop);
}

function update(dt){
  if(state.battlePhase!=='fighting')return;
  // spawn enemies
  if(state.enemiesSpawned<state.enemiesThisWave.length){
    state.enemySpawnTimer-=dt;
    if(state.enemySpawnTimer<=0){
      const template=state.enemiesThisWave[state.enemiesSpawned];
      spawnEnemy(template);
      state.enemiesSpawned++;
      state.enemySpawnTimer=1800+Math.random()*1000;
    }
  }
  // move enemies
  const laneEl=document.getElementById('enemy-lane');
  const laneW=laneEl.offsetWidth||370;
  const laneH = laneEl.offsetHeight || 185;
  state.enemies.forEach(e=>{
    e.y += (e.speed * dt * 0.06);
    const el=document.getElementById('enemy-'+e.id);
    if(el) el.style.top=e.y+'px';
    // reached base (bottom of lane)
    if(e.y > laneH - 10){
      damageBase(e.atk*(1+state.wave*0.1));
      e.dead=true;
      if(el)el.remove();
    }
  });
  // hero attacks
  state.lastHeroAtk-=dt;
  if(state.lastHeroAtk<=0){
    state.lastHeroAtk=Math.floor(2000/state.spdBonus);
    heroAttackCycle();
  }
  // remove dead
  state.enemies=state.enemies.filter(e=>!e.dead);
  // update ult cooldowns
  state.selectedHeroes.forEach(cid=>{
    if(state.ultCooldowns[cid]>0){
      state.ultCooldowns[cid]=Math.max(0,state.ultCooldowns[cid]-dt);
      if(state.ultCooldowns[cid]<=0){showToast(`⚡ ${CHARS[cid].ultName} 已就绪！`);}
    }
  });
  // update enemy count display
  document.getElementById('btb-enemy-count').textContent=`敌军${state.enemies.length}`;
  // check wave clear
  if(!state.waveCleared&&state.enemiesSpawned>=state.enemiesThisWave.length&&state.enemies.length===0){
    state.waveCleared=true;
    onWaveCleared();
  }
}

let enemyIdCounter=0;
function spawnEnemy(template){
  const id=++enemyIdCounter;
  const laneEl=document.getElementById('enemy-lane');
  const laneW=laneEl.offsetWidth||370;
  const colW = laneW / G;
  // Assign a random column (0 to G-1)
  const col = Math.floor(Math.random() * G);
  const e={
    id,name:template.name,hp:template.hp,maxHp:template.hp,
    atk:template.atk,speed:template.speed,reward:template.reward,
    svg:template.svg,size:template.size||44,
    col, // which column this enemy is in
    x: col * colW + colW/2 - (template.size||44)/2, // fixed x based on column
    y: -50, // start above
    dead:false
  };
  state.enemies.push(e);
  const el=document.createElement('div');el.id='enemy-'+id;el.className='enemy-sprite';
  const svgSize = template.size||44;
  el.style.cssText=`left:${e.x}px;top:${e.y}px;width:${svgSize}px;position:absolute;`;
  el.innerHTML=`<div style="width:${svgSize}px;height:${svgSize}px;">${MONSTER_SVGS[e.svg]||''}</div><div class="enemy-hp-mini"><div class="enemy-hp-mini-f" id="ehp-${id}" style="width:100%"></div></div>`;
  laneEl.appendChild(el);
}

function heroAttackCycle(){
  if(state.enemies.length===0)return;
  const alive=state.enemies.filter(e=>!e.dead);
  if(alive.length===0)return;
  const critSks=state.skills.filter(s=>s==='crit').length;
  const extraHit=state.skills.filter(s=>s==='multi').length;

  // For each column, find the best hero in that column and the closest enemy in that column
  for(let col=0; col<G; col++){
    // Find hero cells in this column (col, col+G, col+2G, ...)
    let bestHeroCid = null;
    let bestTierIdx = -1;
    for(let row=0; row<G; row++){
      const idx = row*G + col;
      if(grid[idx]&&grid[idx].type==='hero'&&state.selectedHeroes.includes(grid[idx].charId)){
        const t = grid[idx].tierIdx||0;
        if(t > bestTierIdx){ bestTierIdx=t; bestHeroCid=grid[idx].charId; }
      }
    }
    if(!bestHeroCid) continue;

    // Find closest enemy in this column
    const colEnemies = alive.filter(e=>e.col===col&&!e.dead);
    if(colEnemies.length===0) continue;
    const target = colEnemies.reduce((a,b)=>a.y>b.y?a:b); // furthest down

    const dmg=calcHeroAtk(bestHeroCid);
    const isCrit=critSks>0&&Math.random()<0.2*critSks;
    const finalDmg=isCrit?dmg*2:dmg;
    const total=Math.floor(finalDmg*(1+extraHit*0.5));
    if(!target.dead){
      const eEl=document.getElementById('enemy-'+target.id);
      if(eEl){const r=eEl.getBoundingClientRect();const ar=document.getElementById('app').getBoundingClientRect();showAttackFX(bestHeroCid,r.left-ar.left+r.width/2,r.top-ar.top+r.height/2);}
      applyDamageToEnemy(target,total);
      spawnDmgNumber(total,isCrit);
    }
  }
}

function applyDamageToEnemy(e,dmg){
  if(e.dead)return;
  e.hp-=dmg;
  const hpEl=document.getElementById('ehp-'+e.id);
  if(hpEl)hpEl.style.width=Math.max(0,e.hp/e.maxHp*100)+'%';
  if(e.hp<=0){
    e.dead=true;
    const el=document.getElementById('enemy-'+e.id);
    if(el){el.style.animation='fadeUpOut .3s ease-out forwards';setTimeout(()=>el.remove(),300);}
    // reward steps
    state.steps+=Math.ceil(e.reward/10);updateStepsDisplay();
  }
}

function damageBase(dmg){
  state.baseHp=Math.max(0,state.baseHp-dmg);
  updateBaseHpBar();
  if(state.baseHp<=0){onGameOver();}
}

function updateBaseHpBar(){
  const pct=Math.max(0,state.baseHp/state.baseMaxHp*100);
  const f=document.getElementById('base-hp-f');const t=document.getElementById('base-hp-text');
  if(f){f.style.width=pct+'%';f.style.background=pct>60?'linear-gradient(90deg,#4a1a8a,#9050d0)':pct>30?'linear-gradient(90deg,#8a8a00,#cccc00)':'linear-gradient(90deg,#8a1a1a,#cc4040)';}
  if(t)t.textContent=`${Math.max(0,Math.floor(state.baseHp))}/${state.baseMaxHp}`;
}

function spawnDmgNumber(dmg,isCrit){
  const arena=document.getElementById('battle-scene');
  const el=document.createElement('div');el.className='dmg-num';
  el.textContent=(isCrit?'💥':'')+Math.floor(dmg);
  el.style.cssText=`top:${30+Math.random()*60}%;left:${20+Math.random()*50}%;color:${isCrit?'#ffd700':'#ff6060'};`;
  arena.appendChild(el);setTimeout(()=>el.remove(),800);
}

function onWaveCleared(){
  cancelAnimationFrame(gameLoopId);
  const maxWave=MONSTERS_BY_WAVE.length;
  if(state.wave>=maxWave-1){
    // all waves done
    setTimeout(()=>endBattle(true),800);
  } else {
    showToast(`✦ 第${state.wave+1}波清除！准备下一波…`);
    setTimeout(()=>spawnWave(state.wave+1),2500);
  }
}

function onGameOver(){
  cancelAnimationFrame(gameLoopId);
  state.battleActive=false;
  setTimeout(()=>endBattle(false),500);
}

function endBattle(win){
  state.battleActive=false;
  cancelAnimationFrame(gameLoopId);
  if(win){
    state.selectedHeroes.forEach(cid=>{state.aff[cid]=Math.min(MAX_AFF,(state.aff[cid]||0)+15);});
    playResultSound(true);
  } else {playResultSound(false);}
  showS('s-result');
  const rt=document.getElementById('result-title-text');
  rt.className='result-title-text '+(win?'win':'lose');
  rt.textContent=win?'✦ 胜利 ✦':'✦ 败北 ✦';
  const rs=document.getElementById('s-result');
  rs.className='screen active '+(win?'result-bg-win':'result-bg-lose');
  document.getElementById('result-stats-box').innerHTML=win
    ?`<b>守卫成功！</b><br><b>坚守波数</b>　${state.wave+1}<br><b>英雄好感</b>　各 +15<br><b>基地剩余</b>　${Math.floor(state.baseHp)}/${state.baseMaxHp}`
    :`<b>基地陷落……</b><br><b>坚守波数</b>　${state.wave+1}<br><b>提示</b>　合成更高阶英雄再战！`;
  if(win&&!state.firstBattleDone){
    state.firstBattleDone=true;
    setTimeout(()=>showDancerIntro(),1200);
  }
}

function resultToHub(){
  if(!state.hubUnlocked){state.hubUnlocked=true;}
  showS('s-hub');updateHubDisplay();
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('nav-battle').classList.add('active');
}

function replayBattle(){
  state.skills=[];state.steps=BASE_STEPS;
  initBattle();showS('s-battle');
}

function startFighting(){
  if(state.battlePhase!=='prepare')return;
  state.battlePhase='fighting';
  state.battleActive=true;
  state.lastHeroAtk=performance.now();
  const fb=document.getElementById('fight-start-btn');
  if(fb)fb.style.display='none';
  const pb=document.getElementById('pause-btn');
  if(pb)pb.style.display='block';
  document.getElementById('btb-wave').textContent='第 1 波';
  document.getElementById('btb-enemy-count').textContent='';
  spawnWave(0);
}

function togglePause(){
  state.paused=!state.paused;
  document.getElementById('pause-btn').textContent=state.paused?'继续':'暂停';
  if(!state.paused){lastTime=performance.now();}
}

function confirmLeave(){
  const msg = state.battlePhase==='fighting' 
    ? '确定放弃战斗返回驻地？\n战斗进度将丢失。'
    : '确定返回驻地？';
  if(confirm(msg)){
    cancelAnimationFrame(gameLoopId);
    state.battleActive=false;
    state.battlePhase='prepare';
    // Clear all enemies
    state.enemies=[];
    const lane=document.getElementById('enemy-lane');
    if(lane) lane.innerHTML='';
    if(state.hubUnlocked){showS('s-hub');updateHubDisplay();}
    else{showS('s-title');}
  }
}

// ══ ULT ══
function triggerUlt(charId,cellIdx){
  if(state.ultCooldowns[charId]>0){showToast('大招冷却中…');return;}
  const def=CHARS[charId];
  state.ultCooldowns[charId]=def.ultCd*1000;
  playUltSound(charId);
  showUltOverlay(charId);
  // apply ult effect
  if(charId==='ruoyin'){
    // heal base + atk buff
    const heal=Math.floor(state.baseMaxHp*0.1);
    state.baseHp=Math.min(state.baseMaxHp,state.baseHp+heal);
    updateBaseHpBar();
    state.atkBonus*=1.3;
    setTimeout(()=>{state.atkBonus/=1.3;},8000);
    showToast(`🌿 木灵庇护！基地+${heal}HP，攻击×1.3（8秒）`);
  } else if(charId==='huaishi'){
    // nuke all enemies
    const totalAtk=calcTotalAtk()*5;
    [...state.enemies].forEach(e=>applyDamageToEnemy(e,totalAtk));
    showToast(`⚔️ 元官裂空斩！伤害 ${Math.floor(totalAtk)}`);
  } else if(charId==='dancer'){
    // triple damage + slow
    const tripleAtk=calcTotalAtk()*3;
    [...state.enemies].forEach(e=>applyDamageToEnemy(e,tripleAtk));
    state.enemies.forEach(e=>e.speed*=0.4);
    setTimeout(()=>state.enemies.forEach(e=>e.speed/=0.4),5000);
    showToast(`💧 月华水舞！伤害×3，全场减速5秒`);
  }
  renderGrid();renderHeroStats();
}

function showUltOverlay(charId){
  const ultColors={ruoyin:'rgba(80,200,80,.6)',huaishi:'rgba(100,150,255,.6)',dancer:'rgba(100,200,255,.6)'};
  const overlay=document.getElementById('ult-overlay');
  overlay.innerHTML='';
  const flash=mkEl('div','ult-flash');flash.style.background=ultColors[charId]||'rgba(255,215,0,.5)';
  overlay.appendChild(flash);
  const txt=mkEl('div','ult-text',CHARS[charId].ultName);overlay.appendChild(txt);
  // particles
  for(let i=0;i<20;i++){
    const p=mkEl('div','ult-particle');
    const sz=6+Math.random()*10;const px=(Math.random()-0.5)*300;const py=(Math.random()-0.5)*400;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${ultColors[charId]||'#ffd700'};left:50%;top:50%;--px:${px}px;--py:${py}px;`;
    overlay.appendChild(p);
  }
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'),1000);
}

// ══════════════════════════════════════
function queueChest(chestType){
  chestQueue.push(chestType);
  if(!chestOpen)processChestQueue();
}
function processChestQueue(){
  if(chestQueue.length===0){chestOpen=false;return;}
  chestOpen=true;
  const ct=chestQueue.shift();
  openChestUI(ct);
}
function openChestUI(chestType){
  const tierMap={chest_white:'white',chest_blue:'blue',chest_purple:'purple'};
  const tier=tierMap[chestType]||'white';
  const titles={chest_white:'📦 白宝箱',chest_blue:'💎 蓝宝箱',chest_purple:'💜 紫宝箱'};
  document.getElementById('co-title').textContent=titles[chestType];
  // build 3 options
  const pool=(CHEST_SKILLS[tier]||CHEST_SKILLS.white).map(id=>SKILLS_POOL.find(s=>s.id===id)).filter(Boolean);
  shuffle(pool);
  const options=pool.slice(0,3);
  // sometimes include relic drop
  const relicChance={white:0.1,blue:0.25,purple:0.5};
  if(Math.random()<(relicChance[tier]||0.1)){
    const eligibleRelics=RELICS_DEF.filter(r=>state.recruited.includes(r.charId));
    if(eligibleRelics.length>0){
      const rel=eligibleRelics[Math.floor(Math.random()*eligibleRelics.length)];
      options[2]={id:'relic_'+rel.id,icon:'🎁',name:rel.name,desc:rel.desc+'\n可在背包使用',tag:'消耗品',isRelic:true,relicId:rel.id,relicName:rel.name};
    }
  }
  const cards=document.getElementById('co-cards');cards.innerHTML='';
  options.forEach(sk=>{
    const card=mkEl('div','co-card');
    card.innerHTML=`<div class="co-card-icon">${sk.icon||'🎁'}</div><div><div class="co-card-name">${sk.name}</div><div class="co-card-desc">${sk.desc||''}</div><div class="co-card-tag">${sk.tag||''}</div></div>`;
    card.onclick=()=>{
      if(sk.isRelic){addRelicToBag(sk.relicId,sk.relicName);showToast(`🎁 获得信物：${sk.relicName}`);}
      else{
        state.skills.push(sk.id);
        // immediate hp bonus
        if(sk.hpMult){state.baseMaxHp=Math.floor(state.baseMaxHp*sk.hpMult);state.baseHp=Math.floor(state.baseHp*sk.hpMult);updateBaseHpBar();}
        if(sk.spdMult){state.spdBonus*=sk.spdMult;}
      }
      document.getElementById('chest-overlay').classList.remove('show');
      renderSkillsStrip();renderHeroStats();renderGrid();
      if(state.paused)state.paused=false;
      setTimeout(processChestQueue,200);
    };
    cards.appendChild(card);
  });
  state.paused=true;
  document.getElementById('chest-overlay').classList.add('show');
}

function goVN(cid){
  vnPhase=cid;vnSc=VNS[cid];vnIdx=0;
  document.getElementById('vnchar').classList.remove('vis');
  document.getElementById('vnnp').classList.remove('vis');
  document.getElementById('vnjoin').classList.remove('vis');
  document.getElementById('vnchoices').classList.remove('vis');
  document.getElementById('vnchoices').innerHTML='';
  // set bg
  const firstBg=vnSc[0]?.bg||'';
  document.getElementById('vnbg').className='vn-bg '+(firstBg==='ruins'?'vn-bg-ruins':firstBg==='dark'?'vn-bg-dark':'vn-bg-miao');
  setTimeout(()=>vnShow(vnSc[0]),300);
}

function vnShow(sc){
  if(!sc)return;
  if(sc.type==='choice'){vnShowChoices(sc);return;}
  if(sc.type==='join'){vnJoin();return;}
  if(sc.type==='dancer_choice'){vnShowDancerChoices(sc);return;}
  if(sc.bg)document.getElementById('vnbg').className='vn-bg '+(sc.bg==='ruins'?'vn-bg-ruins':sc.bg==='dark'?'vn-bg-dark':'vn-bg-miao');
  const ce=document.getElementById('vnchar');const ci=document.getElementById('vnchar-img');
  if(sc.showChar){
    const cid=vnPhase==='dancer_intro'?'dancer':vnPhase.startsWith('ruoyin')?'ruoyin':'huaishi';
    ci.src=IMGS[cid]||'';ce.classList.add('vis');
  } else ce.classList.remove('vis');
  if(sc.showPlate){
    const cid=vnPhase==='dancer_intro'?'dancer':vnPhase.startsWith('ruoyin')?'ruoyin':'huaishi';
    document.getElementById('vnnp-name').textContent=CHARS[cid].name;
    document.getElementById('vnnp-sub').textContent=CHARS[cid].sub;
    document.getElementById('vnnp').classList.add('vis');
  }
  document.getElementById('vnsp').textContent=sc.sp||'';
  const te=document.getElementById('vntxt');te.className=sc.narr?'narr':'';
  vnType(sc.txt||'',te);
}
function vnType(txt,el){
  txt=txt.replace(/\\n/g,'\n');
  el.textContent='';isTyping=true;document.getElementById('vnhint').classList.remove('vis');
  clearTimeout(tyT);let i=0;
  function tk(){if(i<txt.length){el.textContent+=txt[i];i++;tyT=setTimeout(tk,30);}else{isTyping=false;document.getElementById('vnhint').classList.add('vis');}}
  tk();
}
function vnAdv(){
  if(isTyping){clearTimeout(tyT);const sc=vnSc[vnIdx];if(sc?.txt)document.getElementById('vntxt').textContent=sc.txt.replace(/\\n/g,'\n');isTyping=false;document.getElementById('vnhint').classList.add('vis');return;}
  vnIdx++;if(vnIdx<vnSc.length)vnShow(vnSc[vnIdx]);
}
function vnShowChoices(sc){
  document.getElementById('vnhint').classList.remove('vis');
  const el=document.getElementById('vnchoices');el.innerHTML='';
  sc.choices.forEach((c,i)=>{
    const b=document.createElement('button');b.className='vn-ch';
    b.innerHTML=`${c.txt}`;
    b.onclick=()=>{
      el.classList.remove('vis');el.innerHTML='';
      const vnCid=vnPhase.startsWith('ruoyin')?'ruoyin':'huaishi';
      state.aff[vnCid]=(state.aff[vnCid]||0)+c.aff;
      spawnVNAffGain('+'+c.aff+' 好感');
      if(c.relic)addRelicToBag(c.relic,c.relicName);
      if(c.relicName)showToast(`✦ 获得信物：${c.relicName}`);
      const nextKey=sc.next_map?sc.next_map[i]:vnPhase+'_'+c.next;
      vnSc=VNS[nextKey]||[];vnIdx=0;if(vnSc.length)vnShow(vnSc[0]);
    };
    el.appendChild(b);
  });
  el.classList.add('vis');
}
function vnJoin(){
  const cid=vnPhase.startsWith('ruoyin')?'ruoyin':'huaishi';
  if(!state.recruited.includes(cid)){state.recruited.push(cid);state.selectedHeroes.push(cid);}
  if(!state.mainHero)state.mainHero=cid;
  document.getElementById('jem').textContent=cid==='ruoyin'?'🌿':'⚔️';
  document.getElementById('jnm').textContent=CHARS[cid].name+'  加入了战队！';
  document.getElementById('jsb').textContent=CHARS[cid].sub;
  const jb=document.getElementById('jbtn');
  if(state.recruited.length===1){
    jb.textContent='前往元官废庙';jb.onclick=()=>{document.getElementById('vnjoin').classList.remove('vis');goVN('huaishi');};
  } else {
    jb.textContent='进入驻地';jb.onclick=()=>{document.getElementById('vnjoin').classList.remove('vis');state.hubUnlocked=true;showS('s-hub');updateHubDisplay();};
  }
  document.getElementById('vnjoin').classList.add('vis');
}
function showDancerIntro(){
  vnPhase='dancer_intro';vnSc=VNS_DANCER;vnIdx=0;
  document.getElementById('vnchar').classList.remove('vis');document.getElementById('vnnp').classList.remove('vis');
  document.getElementById('vnjoin').classList.remove('vis');
  document.getElementById('vnchoices').classList.remove('vis');document.getElementById('vnchoices').innerHTML='';
  showS('s-vn');document.getElementById('vnbg').className='vn-bg vn-bg-dark';
  setTimeout(()=>vnShow(VNS_DANCER[0]),400);
}
function vnShowDancerChoices(sc){
  document.getElementById('vnhint').classList.remove('vis');
  const el=document.getElementById('vnchoices');el.innerHTML='';
  sc.choices.forEach(c=>{
    const b=document.createElement('button');b.className='vn-ch';
    b.innerHTML=`${c.txt}`;
    b.onclick=()=>{
      el.classList.remove('vis');el.innerHTML='';
      if(!state.recruited.includes('dancer')){state.recruited.push('dancer');state.selectedHeroes.push('dancer');}
      state.aff['dancer']=(state.aff['dancer']||0)+c.aff;
      if(c.relic)addRelicToBag(c.relic,c.relicName);
      if(c.relicName)showToast(`✦ 获得信物：${c.relicName}`);
      // join screen
      document.getElementById('jem').textContent='💧';
      document.getElementById('jnm').textContent='白淼 加入了战队！';
      document.getElementById('jsb').textContent=CHARS['dancer'].sub;
      const jb=document.getElementById('jbtn');
      jb.textContent='进入主界面';
      jb.onclick=()=>{
        document.getElementById('vnjoin').classList.remove('vis');
        state.hubUnlocked=true;showS('s-hub');updateHubDisplay();
        showToast('✦ 主界面已解锁！三位英雄齐聚！');
        // show new feature badge
        document.getElementById('bag-badge').style.display='';
      };
      document.getElementById('vnjoin').classList.add('vis');
    };
    el.appendChild(b);
  });
  el.classList.add('vis');
}
document.getElementById('s-vn').addEventListener('click',e=>{
  if(e.target.classList.contains('vn-ch')||e.target.id==='jbtn'||
     document.getElementById('vnjoin').classList.contains('vis')||
     document.getElementById('vnchoices').classList.contains('vis'))return;

});

function goAff(cid){
  currentAffChar=cid;
  const data=AFF_DATA[cid];const a=state.aff[cid]||0;const maxed=a>=MAX_AFF;
  const bgColors={ruoyin:'radial-gradient(ellipse 60% 70% at 50% 100%,#1a3d28,transparent 65%),linear-gradient(180deg,#060408,#0a1010)',huaishi:'radial-gradient(ellipse 70% 60% at 50% 100%,#0a1a0a,transparent 65%),linear-gradient(180deg,#060404,#080e08)',dancer:'radial-gradient(ellipse 60% 70% at 50% 100%,#0a1428,transparent 65%),linear-gradient(180deg,#060408,#080a14)'};
  document.getElementById('aff-bg-el').style.cssText='position:absolute;inset:0;background:'+(bgColors[cid]||bgColors.ruoyin)+';';
  const cw=document.getElementById('aff-char-wrap');const ci=document.getElementById('aff-char-img');
  ci.src=IMGS[cid]||'';cw.classList.remove('vis');setTimeout(()=>cw.classList.add('vis'),50);
  document.getElementById('aff-char-name').textContent=CHARS[cid].name;
  updateAffBar(cid);
  document.getElementById('aff-mood-text').textContent=maxed?data.maxLine:data.moods[Math.floor(Math.random()*data.moods.length)];
  renderAffActs(cid);
  // Populate profile box
  const prof = CHAR_PROFILES[cid];
  if(prof){
    document.getElementById('aff-profile-element').textContent=prof.element;
    document.getElementById('aff-profile-quality').textContent=prof.quality+(prof.role?' · '+prof.role:'');
    document.getElementById('aff-profile-story').textContent=prof.story;
    document.getElementById('aff-profile-atk').textContent=prof.atk;
    document.getElementById('aff-profile-ult').textContent=prof.ult;
    const cdEl=document.getElementById('aff-profile-cd');
    if(cdEl)cdEl.innerHTML='冷却 <span style="color:rgba(200,180,255,.6);">'+prof.cd+'</span>';
  }
  // Overflow & costume info
  const overflow=state.affOverflow[cid]||0;
  const tickets=state.costumeTickets[cid]||0;
  const maxed=(state.aff[cid]||0)>=MAX_AFF;
  const ovEl=document.getElementById('aff-overflow-info');
  if(ovEl){
    if(maxed) ovEl.textContent='💛 好感已满级 · 积累进度：'+overflow+'/50（下一张时装券）';
    else ovEl.textContent='';
  }
  const ctEl=document.getElementById('aff-costume-info');
  if(ctEl){
    if(tickets>0) ctEl.textContent='🎫 时装券 ×'+tickets;
    else if(maxed) ctEl.textContent='🎫 时装券 ×0（满级后每积累50好感获得1张）';
    else ctEl.textContent='';
  }
  const cbtn=document.getElementById('aff-costume-btn');
  if(cbtn) cbtn.style.display=maxed?'block':'none';
  showS('s-aff');
}
function updateAffBar(cid){
  const a=state.aff[cid]||0;
  document.getElementById('aff-bar-fg').style.width=Math.min(100,a/MAX_AFF*100)+'%';
  document.getElementById('aff-bar-num').textContent=a+'/100';
  const lv=a>=MAX_AFF?'满级💛':a>=70?'Lv.3':a>=30?'Lv.2':'Lv.1';
  document.getElementById('aff-lv-lbl').textContent='好感度 '+lv;
}
function getGreetLeft(cid){
  try{const v=localStorage.getItem('greet_'+cid+'_'+new Date().toISOString().slice(0,10));return v===null?3:Math.max(0,3-parseInt(v));}catch(e){return 3;}
}
function useGreet(cid){
  try{const k='greet_'+cid+'_'+new Date().toISOString().slice(0,10);const v=localStorage.getItem(k);localStorage.setItem(k,v===null?1:parseInt(v)+1);}catch(e){}
}
function renderAffActs(cid){
  const data=AFF_DATA[cid];const maxed=(state.aff[cid]||0)>=MAX_AFF;
  const el=document.getElementById('aff-acts-row');el.innerHTML='';
  const left=getGreetLeft(cid);const greetDis=maxed||left<=0;
  const gi=Math.floor(Math.random()*data.greetings.length);const gr=data.greetings[gi];
  const gb=document.createElement('button');gb.className='aff-act-btn';
  gb.innerHTML=`打招呼<small class="aff-act-small">${maxed?'已满级':left<=0?'今日已满':'+'+gr.g+' 好感('+left+'/3)'}</small>`;
  gb.disabled=greetDis;
  if(!greetDis)gb.onclick=()=>{useGreet(cid);gainAff(cid,gr.g);document.getElementById('aff-mood-text').textContent=gr.line;renderAffActs(cid);updateAffBar(cid);spawnAffGain('+'+gr.g);};
  el.appendChild(gb);
  const giftsInBag=state.bag.filter(i=>i.type==='relic'&&RELICS_DEF.find(r=>r.id===i.relicId&&r.charId===cid));
  const giftDis=maxed;
  const ftb=document.createElement('button');ftb.className='aff-act-btn';
  ftb.innerHTML=`送礼物<small class="aff-act-small">${maxed?'已满级':giftsInBag.length>0?'使用背包信物':'固定礼物'}</small>`;
  ftb.disabled=giftDis;
  if(!giftDis)ftb.onclick=()=>showGiftPicker(cid);
  el.appendChild(ftb);
}
function showGiftPicker(cid){
  const data=AFF_DATA[cid];
  document.getElementById('pop-title').textContent='选择礼物';
  // bag relics for this char
  const bagRelics=state.bag.filter(i=>i.type==='relic'&&RELICS_DEF.find(r=>r.id===i.relicId&&r.charId===cid));
  const fixedGifts=data.gifts;
  let html='';
  if(bagRelics.length>0){
    html+='<div style="font-size:9px;color:#9070d0;margin-bottom:4px;">背包信物：</div>';
    bagRelics.forEach(item=>{
      const rel=RELICS_DEF.find(r=>r.id===item.relicId);
      html+=`<button onclick="doGiftRelic('${cid}','${item.relicId}')" style="display:block;width:100%;margin-bottom:5px;background:rgba(120,80,200,.1);border:1px solid rgba(150,100,220,.3);color:#f0e8d4;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;padding:7px 10px;cursor:pointer;text-align:left;border-radius:4px;">${item.name} <span style="float:right;color:#9070d0;">+${rel?.aff||10}</span></button>`;
    });
    html+='<div style="font-size:9px;color:rgba(240,232,212,.3);margin:6px 0 4px;">固定礼物：</div>';
  }
  fixedGifts.forEach((g,i)=>{
    html+=`<button onclick="doGift('${cid}',${i})" style="display:block;width:100%;margin-bottom:5px;background:rgba(0,0,0,.3);border:1px solid rgba(200,200,230,.2);color:#f0e8d4;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:11px;padding:7px 10px;cursor:pointer;text-align:left;border-radius:4px;">${g.name} <span style="float:right;color:#9070d0;">+${g.g}</span></button>`;
  });
  document.getElementById('pop-body').innerHTML=html;

function gainAff(cid,n){
  const cur=state.aff[cid]||0;
  if(cur>=MAX_AFF){
    // Already maxed - accumulate overflow
    state.affOverflow[cid]=(state.affOverflow[cid]||0)+n;
    // Check for costume ticket (every 50 overflow points)
    if(state.affOverflow[cid]>=50){
      state.affOverflow[cid]-=50;
      state.costumeTickets[cid]=(state.costumeTickets[cid]||0)+1;
      setTimeout(()=>showToast('🎫 '+CHARS[cid].name+' 获得时装券×1！'),500);
    }
  } else {
    state.aff[cid]=Math.min(MAX_AFF,cur+n);
    if(state.aff[cid]>=MAX_AFF)setTimeout(()=>{showToast('💛 '+CHARS[cid].name+' 好感满级！战力+10%');document.getElementById('aff-mood-text').textContent=AFF_DATA[cid].maxLine;},400);
  }
}

let audioCtx=null;
function getAudioCtx(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return audioCtx;}
function playMergeSound(item){
  const ctx=getAudioCtx();if(!ctx)return;
  try{
    const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    const f=item.type==='hero'?[523,659,784,1047][Math.min(item.tierIdx||0,3)]:880;
    o.frequency.setValueAtTime(f,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(f*1.4,ctx.currentTime+0.15);
    o.type='sine';g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);
  }catch(e){}
}
function playUltSound(charId){
  const ctx=getAudioCtx();if(!ctx)return;
  try{
    const freqs={ruoyin:[392,494,587,740],huaishi:[262,330,392,523,659],dancer:[523,659,784,1047,1319]};
    const fs=freqs[charId]||freqs.huaishi;

      const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
      o.type=charId==='huaishi'?'sawtooth':'sine';o.frequency.value=f;
      const t=ctx.currentTime+i*0.08;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
