function giveRoamReward(score,gameId){
  let tier=score>=80?3:score>=40?2:1;
  let rewards=[];
  if(gameId==='snake'){
    const pool=['wood','phys','water','fire'];
    for(let i=0;i<tier;i++){const k=pool[Math.floor(Math.random()*pool.length)];const r=ROAM_RELICS[k];addRelicToBag(r.id,r.name);rewards.push(r.name);}
  } else if(gameId==='sudoku'){
    // 古籍残卷 = all heroes get affinity
    const gain=tier*3;
    state.recruited.forEach(cid=>gainAff(cid,gain));
    rewards.push('📜 古籍残卷（全体亲密度+'+gain+'）');
  } else if(gameId==='quiz'){
    const stones=tier*2;
    state.jadeStones=(state.jadeStones||0)+stones;
    rewards.push('💎 秘境玉石 ×'+stones);
  } else if(gameId==='match3'){
    const pool=['fire','butterfly','scroll','wood','water'];
    for(let i=0;i<tier;i++){const k=pool[Math.floor(Math.random()*pool.length)];const r=ROAM_RELICS[k];addRelicToBag(r.id,r.name);rewards.push(r.name);}
  }
  return rewards;
}

// ══ SNAKE GAME (蛇口寻踪) ══
function initSnakeGame(area){
  area.innerHTML='';
  const W=15,H=15,SZ=Math.floor(Math.min((document.getElementById('app').offsetWidth-20)/W,22));
  let snake=[{x:7,y:7}],dir={x:1,y:0},food=null,score=0,alive=true,interval=null;
  function placeFood(){let x,y;do{x=Math.floor(Math.random()*W);y=Math.floor(Math.random()*H);}while(snake.some(s=>s.x===x&&s.y===y));food={x,y};}
  placeFood();
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center;padding:10px;gap:8px;flex:1;';
  const scoreEl=document.createElement('div');scoreEl.style.cssText='font-size:14px;color:#e0c8ff;letter-spacing:2px;';scoreEl.textContent='灵气：0';
  const canvas=document.createElement('canvas');canvas.width=W*SZ;canvas.height=H*SZ;canvas.style.cssText='border:1px solid rgba(200,150,255,.3);border-radius:6px;background:#080018;touch-action:none;';
  const ctx=canvas.getContext('2d');
  // Controls
  const controls=document.createElement('div');controls.style.cssText='display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,44px);gap:4px;justify-content:center;';
  const dirs=[{l:'',d:null},{l:'↑',d:{x:0,y:-1}},{l:'',d:null},{l:'←',d:{x:-1,y:0}},{l:'↓',d:{x:0,y:1}},{l:'→',d:{x:1,y:0}}];
  dirs.forEach(d=>{
    const b=document.createElement('button');
    b.style.cssText='background:rgba(200,150,255,.15);border:1px solid rgba(200,150,255,.3);color:#e0c8ff;font-size:18px;border-radius:6px;cursor:pointer;';
    b.textContent=d.l;
    if(d.d)b.onclick=()=>{if(!(d.d.x===-dir.x&&d.d.y===-dir.y))dir=d.d;};
    else b.style.visibility='hidden';
    controls.appendChild(b);
  });
  // Touch swipe
  let tx=0,ty=0;
  canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){if(dx>20&&dir.x!==(-1))dir={x:1,y:0};else if(dx<-20&&dir.x!==1)dir={x:-1,y:0};}else{if(dy>20&&dir.y!==(-1))dir={x:0,y:1};else if(dy<-20&&dir.y!==1)dir={x:0,y:-1};}},{passive:true});
  function draw(){
    ctx.fillStyle='#080018';ctx.fillRect(0,0,W*SZ,H*SZ);
    // Grid lines
    ctx.strokeStyle='rgba(200,150,255,.06)';ctx.lineWidth=.5;
    for(let i=0;i<=W;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,H*SZ);ctx.stroke();}
    for(let i=0;i<=H;i++){ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(W*SZ,i*SZ);ctx.stroke();}
    // Food
    if(food){ctx.fillStyle='#60ff80';ctx.shadowColor='#60ff80';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    // Snake
    snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#c080ff':'rgba(160,100,255,'+(0.9-i*0.02)+')';ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);});
  }
  function tick(){
    if(!alive)return;
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)){
      alive=false;clearInterval(interval);
      const rewards=giveRoamReward(score,'snake');
      showToast('🐍 游戏结束！得分：'+score);
      setTimeout(()=>{
        area.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;padding:20px;"><div style="font-size:28px;">🐍</div><div style="font-size:18px;color:#e0c8ff;">蛇口寻踪结束</div><div style="font-size:14px;color:#ffd700;">得分：${score}</div><div style="font-size:11px;color:rgba(200,180,255,.6);text-align:center;">获得奖励：<br>${rewards.join('<br>')}</div><button onclick="startMinigame('snake')" style="background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;padding:10px 28px;cursor:pointer;border:none;border-radius:8px;">再玩一次</button><button onclick="exitMinigame()" style="background:transparent;border:1px solid rgba(200,150,255,.3);color:rgba(200,180,255,.6);font-size:11px;padding:6px 20px;cursor:pointer;border-radius:4px;">返回云游</button></div>`;
      },600);
      return;
    }
    snake.unshift(head);
    if(food&&head.x===food.x&&head.y===food.y){score+=10;scoreEl.textContent='灵气：'+score;placeFood();}
    else snake.pop();
    draw();
  }
  wrap.append(scoreEl,canvas,controls);area.appendChild(wrap);
  draw();
  interval=setInterval(tick,160);
}

// ══ SUDOKU GAME (九宫阵法) ══
function initSudokuGame(area){
  area.innerHTML='';
  // Generate a simple 4x4 sudoku
  const solution=generate4x4Sudoku();
  const puzzle=solution.map(r=>[...r]);
  // Remove some cells
  let removed=0;
  while(removed<7){const r=Math.floor(Math.random()*4),c=Math.floor(Math.random()*4);if(puzzle[r][c]!==0){puzzle[r][c]=0;removed++;}}
  const userGrid=puzzle.map(r=>[...r]);
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px;flex:1;';
  wrap.innerHTML=`<div style="font-size:12px;color:rgba(200,180,255,.5);">填入1-4，使每行每列每个2×2方格不重复</div>`;
  const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(4,56px);grid-template-rows:repeat(4,56px);gap:2px;';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const cell=document.createElement('div');
    const isGiven=puzzle[r][c]!==0;
    cell.style.cssText=`display:flex;align-items:center;justify-content:center;font-size:22px;font-family:'PingFang SC',serif;border:1px solid rgba(200,150,255,.3);border-radius:4px;cursor:${isGiven?'default':'pointer'};background:${isGiven?'rgba(200,150,255,.1)':'rgba(0,0,0,.3)'};color:${isGiven?'#e0c8ff':'#ffd700'};${r===1?'border-bottom:2px solid rgba(200,150,255,.5);':''}${c===1?'border-right:2px solid rgba(200,150,255,.5);':''}`;
    cell.textContent=isGiven?puzzle[r][c]:'';
    cell.dataset.r=r;cell.dataset.c=c;
    if(!isGiven){
      cell.onclick=()=>{
        const cur=userGrid[r][c];
        const next=cur>=4?0:cur+1;
        userGrid[r][c]=next;
        cell.textContent=next||'';
      };
    }
    grid.appendChild(cell);
  }
  const checkBtn=document.createElement('button');
  checkBtn.style.cssText='background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:"ZCOOL XiaoWei","PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;padding:10px 28px;cursor:pointer;border:none;border-radius:8px;';
  checkBtn.textContent='验证阵法';
  checkBtn.onclick=()=>{
    let correct=true;
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(userGrid[r][c]!==solution[r][c]){correct=false;break;}}
    if(correct){
      const rewards=giveRoamReward(80,'sudoku');
      showToast('✦ 阵法破解成功！');
      area.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;padding:20px;"><div style="font-size:28px;">🔢</div><div style="font-size:18px;color:#e0c8ff;">九宫阵法·破解成功</div><div style="font-size:11px;color:rgba(200,180,255,.6);text-align:center;">获得奖励：<br>${rewards.join('<br>')}</div><button onclick="startMinigame('sudoku')" style="background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;padding:10px 28px;cursor:pointer;border:none;border-radius:8px;">再玩一次</button><button onclick="exitMinigame()" style="background:transparent;border:1px solid rgba(200,150,255,.3);color:rgba(200,180,255,.6);font-size:11px;padding:6px 20px;cursor:pointer;border-radius:4px;">返回云游</button></div>`;
    } else {
      showToast('阵法有误，请再检查…');
    }
  };
  wrap.append(grid,checkBtn);area.appendChild(wrap);
}
function generate4x4Sudoku(){
  const base=[[1,2,3,4],[3,4,1,2],[2,1,4,3],[4,3,2,1]];
  // Shuffle rows within bands and columns
  const perm=[1,2,3,4].sort(()=>Math.random()-.5);
  return base.map(row=>row.map(v=>perm[v-1]));
}

// ══ MATCH3 GAME (蛊术消散) ══
function initMatch3Game(area){
  area.innerHTML='';
  const W=6,H=8,types=['🔮','🌿','💧','🔥','⭐','🦋'];
  let board=[],score=0,moves=20,sel=null;
  function init(){board=[];for(let r=0;r<H;r++){board[r]=[];for(let c=0;c<W;c++){do{board[r][c]=Math.floor(Math.random()*types.length);}while(hasMatchAt(r,c));}}render();}
  function hasMatchAt(r,c){
    const v=board[r][c];
    if(c>=2&&board[r][c-1]===v&&board[r][c-2]===v)return true;
    if(r>=2&&board[r-1][c]===v&&board[r-2][c]===v)return true;
    return false;
  }
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center;padding:10px;gap:6px;flex:1;';
  const infoEl=document.createElement('div');infoEl.style.cssText='font-size:12px;color:#e0c8ff;display:flex;gap:16px;';
  const gridEl=document.createElement('div');
  const SZ=Math.floor(Math.min((document.getElementById('app').offsetWidth-24)/W,48));
  gridEl.style.cssText=`display:grid;grid-template-columns:repeat(${W},${SZ}px);grid-template-rows:repeat(${H},${SZ}px);gap:2px;`;
  function render(){
    infoEl.innerHTML=`<span>分数：<b style="color:#ffd700">${score}</b></span><span>步数：<b style="color:${moves<=5?'#ff4040':'#e0c8ff'}">${moves}</b></span>`;
    gridEl.innerHTML='';
    for(let r=0;r<H;r++)for(let c=0;c<W;c++){
      const cell=document.createElement('div');
      cell.style.cssText=`display:flex;align-items:center;justify-content:center;font-size:${SZ*.55}px;background:rgba(0,0,0,.3);border:1px solid ${sel&&sel.r===r&&sel.c===c?'#fff':'rgba(200,150,255,.2)'};border-radius:4px;cursor:pointer;transition:all .15s;${sel&&sel.r===r&&sel.c===c?'transform:scale(1.1);box-shadow:0 0 8px rgba(255,255,255,.5);':''}`;
      cell.textContent=board[r][c]>=0?types[board[r][c]]:'';
      cell.onclick=()=>onTap(r,c);
      gridEl.appendChild(cell);
    }
  }
  function onTap(r,c){
    if(moves<=0)return;
    if(!sel){sel={r,c};render();return;}
    if(sel.r===r&&sel.c===c){sel=null;render();return;}
    const dr=Math.abs(sel.r-r),dc=Math.abs(sel.c-c);
    if((dr===1&&dc===0)||(dr===0&&dc===1)){
      // swap
      const tmp=board[sel.r][sel.c];board[sel.r][sel.c]=board[r][c];board[r][c]=tmp;
      moves--;sel=null;
      processMatches();
    } else {sel={r,c};render();}
  }
  function processMatches(){
    let matched=findMatches();
    if(matched.length===0){render();if(moves<=0)endMatch3();return;}
    matched.forEach(([r,c])=>board[r][c]=-1);
    score+=matched.length*10;
    render();
    setTimeout(()=>{dropDown();setTimeout(()=>{processMatches();},150);},200);
  }
  function findMatches(){
    const m=new Set();
    for(let r=0;r<H;r++)for(let c=0;c<W-2;c++){if(board[r][c]>=0&&board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]){m.add(r+','+c);m.add(r+','+(c+1));m.add(r+','+(c+2));}}
    for(let c=0;c<W;c++)for(let r=0;r<H-2;r++){if(board[r][c]>=0&&board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]){m.add(r+','+c);m.add((r+1)+','+c);m.add((r+2)+','+c);}}
    return[...m].map(s=>{const[r,c]=s.split(',').map(Number);return[r,c];});
  }
  function dropDown(){
    for(let c=0;c<W;c++){let empty=[];for(let r=H-1;r>=0;r--){if(board[r][c]<0)empty.push(r);else if(empty.length>0){board[empty[0]][c]=board[r][c];board[r][c]=-1;empty.push(r);empty.shift();}}
    for(let r=0;r<H;r++){if(board[r][c]<0)board[r][c]=Math.floor(Math.random()*types.length);}}
    render();
  }
  function endMatch3(){
    const rewards=giveRoamReward(score,'match3');
    area.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;padding:20px;"><div style="font-size:28px;">✨</div><div style="font-size:18px;color:#e0c8ff;">蛊术消散·完成</div><div style="font-size:14px;color:#ffd700;">得分：${score}</div><div style="font-size:11px;color:rgba(200,180,255,.6);text-align:center;">获得奖励：<br>${rewards.join('<br>')}</div><button onclick="startMinigame('match3')" style="background:linear-gradient(135deg,#6a3090,#9a60c0);color:#fff;font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;padding:10px 28px;cursor:pointer;border:none;border-radius:8px;">再玩一次</button><button onclick="exitMinigame()" style="background:transparent;border:1px solid rgba(200,150,255,.3);color:rgba(200,180,255,.6);font-size:11px;padding:6px 20px;cursor:pointer;border-radius:4px;">返回云游</button></div>`;
  }
  wrap.append(infoEl,gridEl);area.appendChild(wrap);
  init();
}

function mkEl(tag,cls,html,attrs){
  const el=document.createElement(tag);if(cls)el.className=cls;
  if(html!==undefined)el.innerHTML=html;if(attrs?.style)el.style.cssText=attrs.style;return el;
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
let tT=null;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('on'),2600);}
